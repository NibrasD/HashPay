services:
  - type: web
    name: hashpay-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: HASHKEY_MERCHANT_ID
        sync: false
      - key: HASHKEY_API_SECRET
        sync: false
    rootDir: backend

  - type: web
    name: hashpay-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://hashpay-backend.onrender.com/api
    rootDir: frontend
