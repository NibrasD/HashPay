services:
  - type: web
    name: hashpay
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: HASHKEY_MERCHANT_ID
        sync: false
      - key: HASHKEY_API_SECRET
        sync: false
      - key: VITE_BACKEND_URL
        value: https://hashpay.onrender.com/api # Change this to your final URL
